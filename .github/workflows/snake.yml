name: Generate Snake Game

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # This is the marketplace action you found, fully configured with your outputs
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Pushes the generated SVGs to an isolated 'output' branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
